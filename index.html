<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧設備維保平台 — 系統藍圖 v2.0</title>
<style>
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#222534;--border:#2e3347;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --blue:#3b82f6;--blue-dim:#1e3a5f;
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--purple:#a855f7;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Microsoft JhengHei',system-ui,sans-serif;font-size:14px;line-height:1.6;display:flex;flex-direction:column;}
a{text-decoration:none;color:inherit;}

.main-nav{
  background:#0a0e1a;color:#fff;padding:0 48px;height:48px;
  display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:60;
  border-bottom:1px solid #1e293b;flex-shrink:0;
}
.main-nav-brand{font-size:13px;font-weight:700;color:#cbd5e1;margin-right:32px;display:flex;align-items:center;gap:8px;}
.main-nav-brand::before{content:"";display:inline-block;width:6px;height:14px;background:var(--blue);border-radius:2px;}
.main-nav a{
  color:#94a3b8;font-size:13px;font-weight:500;
  padding:0 18px;height:48px;display:flex;align-items:center;
  border-bottom:2px solid transparent;transition:all .15s;
}
.main-nav a:hover{color:#fff;}
.main-nav a.active{color:#fff;background:rgba(59,130,246,.15);border-bottom-color:var(--blue);}
.main-nav-right{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:11px;color:#64748b;}

.hdr{background:linear-gradient(135deg,#1e2740 0%,#0f1117 60%);border-bottom:1px solid var(--border);padding:18px 48px 16px;flex-shrink:0;}
.hdr-row{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.hdr h1{font-size:20px;font-weight:700;color:#fff;}
.hdr p{color:var(--text2);margin-top:3px;font-size:12px;}
.badge-row{display:flex;gap:6px;flex-wrap:wrap;}
.badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:var(--blue-dim);color:#93c5fd;border:1px solid #1d4ed8;}
.b-g{background:#14532d;color:#86efac;border-color:#166534;}
.b-y{background:#451a03;color:#fcd34d;border-color:#92400e;}
.b-p{background:#3b0764;color:#d8b4fe;border-color:#6b21a8;}

.toolbar{padding:8px 48px;background:#0a0e1a;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0;font-size:12px;color:var(--text3);}
.toolbar button{background:var(--bg2);color:var(--text);border:1px solid var(--border);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s;}
.toolbar button:hover{border-color:var(--blue);color:#fff;}
.toolbar .sep{flex:1;}

.markmap-wrap{flex:1;background:#0f1117;position:relative;overflow:hidden;}
.markmap-wrap.fs{position:fixed;inset:0;z-index:9999;background:#0f1117;}
.markmap-wrap.fs .fs-exit{display:flex;}
.fs-exit{display:none;position:absolute;top:16px;right:16px;z-index:10000;background:rgba(26,29,39,.92);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;align-items:center;gap:6px;backdrop-filter:blur(6px);}
.fs-exit:hover{border-color:var(--blue);}
.markmap{width:100%;height:100%;display:block;}
.markmap-foreign{color:#e2e8f0;font-family:'Segoe UI','Microsoft JhengHei',system-ui,sans-serif;}
.markmap-foreign a{color:#60a5fa;}
.markmap-node > circle{cursor:pointer;}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text2);font-size:13px;}

footer{padding:8px 48px;background:#0a0e1a;border-top:1px solid var(--border);font-size:11px;color:var(--text3);text-align:center;flex-shrink:0;}
footer a{color:var(--blue);}

@media(max-width:768px){
  .main-nav,.hdr,.toolbar,footer{padding-left:16px;padding-right:16px;}
  .main-nav{overflow-x:auto;}
}
</style>
</head>
<body>

<nav class="main-nav">
  <div class="main-nav-brand">智慧點檢平台</div>
  <a href="index.html" class="active">🗺️ 系統藍圖</a>
  <a href="系統盤點分析報告.html">📊 系統盤點總覽</a>
  <a href="現場作業介面說明.html">👷 現場作業介面</a>
  <a href="系統管理與權限說明.html">🔐 系統管理與權限</a>
  <div class="main-nav-right">2026-04-24</div>
</nav>

<header class="hdr">
  <div class="hdr-row">
    <div>
      <h1>🗺️ 智慧維保平台 v2.0 — 系統藍圖</h1>
      <p>跨部門協作地圖｜每個部門：要做什麼任務 × 要他們產出什麼 × 給他們的誘因</p>
    </div>
    <div class="badge-row">
      <span class="badge">9 大部門</span>
      <span class="badge b-g">3 步驟協作法</span>
      <span class="badge b-y">3 輪開會節奏</span>
      <span class="badge b-p">PM 必備</span>
    </div>
  </div>
</header>

<div class="toolbar">
  <button onclick="mm && mm.fit()">🎯 重置視角</button>
  <button onclick="expandAll()">➕ 全部展開</button>
  <button onclick="collapseAll()">➖ 收合至第 2 層</button>
  <button onclick="toggleFullscreen()" id="fsBtn">⛶ 全螢幕</button>
  <span class="sep"></span>
  <span>💡 提示：點擊節點可展開/收合 · 滾輪縮放 · 拖曳平移 · F11 / Esc 切換全螢幕</span>
</div>

<div class="markmap-wrap" id="mmWrap">
  <button class="fs-exit" onclick="toggleFullscreen()">✕ 退出全螢幕 (Esc)</button>
  <div id="loading">⏳ 載入 markmap 中...</div>
  <svg class="markmap" id="markmap"></svg>
</div>

<footer>
  資料來源：<a href="https://rococo-strudel-541f10.netlify.app/#integration" target="_blank">智慧設備維保與備品協同管理平台 v2.0</a>
  · 對應現有系統：Intelligent-Inspection-Platform
</footer>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib/dist/browser/index.js"></script>
<script>

async function init(){
  const mk = window.markmap;
  if (!mk || !mk.Transformer || !mk.Markmap){
    document.getElementById('loading').textContent = '❌ markmap 載入失敗，請檢查網路連線（CDN: jsdelivr）';
    return;
  }

  let markdown;
  try {
    const res = await fetch('blueprint.md');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    markdown = await res.text();
    // strip yaml frontmatter (--- ... ---) if present
    markdown = markdown.replace(/^---\n[\s\S]*?\n---\n/, '');
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '❌ 無法讀取 blueprint.md：' + e.message +
      '<br><br>請用 Live Server 開啟（VSCode 擴充功能），或部署到網站，<br>不能直接雙擊 HTML 開啟（瀏覽器安全限制會擋本地檔案）。';
    return;
  }

  const transformer = new mk.Transformer();
  const { root, features } = transformer.transform(markdown);
  const assets = transformer.getUsedAssets(features);
  if (assets.styles) mk.loadCSS(assets.styles);
  if (assets.scripts) mk.loadJS(assets.scripts);

  const palette = ['#3b82f6','#22c55e','#f59e0b','#a855f7','#ef4444','#06b6d4','#ec4899','#84cc16'];
  let colorIdx = 0;
  const colorMap = new Map();
  function colorFn(node){
    const top = node.state && node.state.path ? node.state.path.split('.')[1] : '0';
    if (!colorMap.has(top)) colorMap.set(top, palette[colorIdx++ % palette.length]);
    return colorMap.get(top);
  }

  const mm = mk.Markmap.create('#markmap', {
    duration: 400,
    maxWidth: 320,
    initialExpandLevel: 3,
    color: colorFn,
  }, root);

  document.getElementById('loading').style.display = 'none';
  window.mm = mm;
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

function walk(node, fn){ fn(node); (node.children||[]).forEach(c=>walk(c,fn)); }
window.expandAll = function(){
  if(!window.mm) return;
  walk(window.mm.state.data, n => { n.payload = n.payload || {}; n.payload.fold = 0; });
  window.mm.renderData(); window.mm.fit();
};
window.toggleFullscreen = function(){
  const wrap = document.getElementById('mmWrap');
  wrap.classList.toggle('fs');
  document.getElementById('fsBtn').textContent = wrap.classList.contains('fs') ? '⛶ 退出全螢幕' : '⛶ 全螢幕';
  setTimeout(() => window.mm && window.mm.fit(), 100);
};
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('mmWrap').classList.contains('fs')) {
    window.toggleFullscreen();
  }
});
window.collapseAll = function(){
  if(!window.mm) return;
  (function fold(node, depth){
    node.payload = node.payload || {};
    node.payload.fold = (depth >= 2 && node.children && node.children.length) ? 1 : 0;
    (node.children||[]).forEach(c => fold(c, depth+1));
  })(window.mm.state.data, 0);
  window.mm.renderData(); window.mm.fit();
};
</script>

</body>
</html>
