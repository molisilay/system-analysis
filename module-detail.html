<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模組詳情 — 智慧設備維保平台</title>
<style>
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#222534;--border:#2e3347;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --blue:#3b82f6;--blue-dim:#1e3a5f;
  --green:#22c55e;--green-dim:#14532d;
  --yellow:#f59e0b;--yellow-dim:#451a03;
  --red:#ef4444;--red-dim:#450a0a;
  --purple:#a855f7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Microsoft JhengHei',system-ui,sans-serif;font-size:14px;line-height:1.6;}
a{text-decoration:none;color:inherit;}

/* TOP NAV */
.topnav{
  position:sticky;top:0;z-index:100;
  background:rgba(15,17,23,.96);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0;
  padding:0 40px;height:52px;
}
.back-btn{
  display:flex;align-items:center;gap:6px;
  color:var(--text2);font-size:13px;font-weight:500;
  padding:6px 12px 6px 0;margin-right:16px;
  border-right:1px solid var(--border);
  cursor:pointer;transition:color .15s;
}
.back-btn:hover{color:#fff;}
.breadcrumb{color:var(--text3);font-size:13px;}
.breadcrumb span{color:var(--text2);}
.nav-tabs{display:flex;gap:2px;margin-left:auto;}
.nav-tab{
  padding:0 18px;height:52px;display:flex;align-items:center;
  font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;
}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue);}

/* HERO */
.hero{
  background:linear-gradient(135deg,#1a2035 0%,#0f1117 70%);
  border-bottom:1px solid var(--border);
  padding:32px 40px 28px;
}
.phase-pill{display:inline-block;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700;margin-bottom:12px;}
.hero-title{font-size:26px;font-weight:700;color:#fff;}
.hero-sub{color:var(--text2);margin-top:6px;font-size:14px;}
.hero-stats{
  display:flex;align-items:center;gap:24px;
  margin-top:22px;padding:18px 20px;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  max-width:660px;
}
.hero-pct{font-size:40px;font-weight:700;}
.hero-pbar-wrap{flex:1;}
.hero-pbar-bg{height:8px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-bottom:8px;}
.hero-pbar-fill{height:100%;border-radius:99px;transition:width .4s;}
.hero-meta{display:flex;gap:16px;flex-wrap:wrap;}
.hero-meta-item{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;cursor:default;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* CONTENT */
.content{max-width:820px;margin:0 auto;padding:36px 40px 80px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── STEPS ── */
.steps{display:flex;flex-direction:column;}
.step{display:flex;gap:0;margin-bottom:20px;}
.step-line{display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0;}
.step-dot{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px;
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  user-select:none;
}
.step-dot:hover{transform:scale(1.15);box-shadow:0 0 0 3px rgba(255,255,255,.12);}
.step-dot-done{background:var(--green)!important;color:#fff!important;}
.step-connector{flex:1;width:2px;background:var(--border);margin:4px 0;}
.step:last-child .step-connector{display:none;}
.step-body{
  flex:1;background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:18px 20px;margin-left:4px;
  transition:border-color .2s,opacity .2s;
}
.step-body.is-done{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04);}
.step-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.step-name{font-weight:700;color:#fff;font-size:15px;}
.step-badge{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;}
.sb-done{background:var(--green-dim);color:#86efac;}
.sb-next{background:var(--blue-dim);color:#93c5fd;}
.sb-plan{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.sb-block{background:var(--red-dim);color:#fca5a5;}
.step-done-stamp{
  margin-left:auto;font-size:11px;color:var(--green);
  display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .2s;
}
.step-body.is-done .step-done-stamp{opacity:1;}
.step-desc{font-size:13px;color:var(--text2);line-height:1.7;}
.step-body.is-done .step-desc{color:var(--text3);}
.step-tasks{list-style:none;margin-top:12px;border-top:1px solid var(--border);padding-top:10px;}
.step-tasks li{
  display:flex;align-items:flex-start;gap:8px;
  padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);
  font-size:13px;color:var(--text2);
}
.step-tasks li:last-child{border-bottom:none;}
.pri{padding:2px 6px;border-radius:3px;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.p-c{background:#450a0a;color:#fca5a5;}
.p-h{background:#451a03;color:#fdba74;}
.p-m{background:#1e3a5f;color:#93c5fd;}
.p-l{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.note{margin-top:12px;padding:11px 14px;border-radius:8px;font-size:12px;line-height:1.65;}
.note-warn{background:rgba(239,68,68,.08);color:#fca5a5;border-left:3px solid var(--red);}
.note-info{background:rgba(59,130,246,.08);color:#93c5fd;border-left:3px solid var(--blue);}
.note-ok  {background:rgba(34,197,94,.08); color:#86efac;border-left:3px solid var(--green);}

/* ── FEATURES ── */
.feat-group{margin-bottom:28px;}
.feat-group-title{
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  padding-bottom:8px;margin-bottom:4px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.feat-progress{margin-left:auto;font-size:11px;font-weight:600;color:var(--text3);}
.feat-list{list-style:none;}

/* checkbox item */
.feat-item{
  display:flex;align-items:center;gap:10px;
  padding:7px 8px;border-radius:7px;
  border-bottom:1px solid rgba(255,255,255,.04);
  font-size:13px;color:var(--text2);
  cursor:pointer;user-select:none;
  transition:background .1s;
}
.feat-item:hover{background:rgba(255,255,255,.04);}
.feat-item:last-child{border-bottom:none;}

/* custom checkbox */
.cb{
  width:18px;height:18px;border-radius:5px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .15s,border-color .15s;
  font-size:11px;font-weight:700;
}
.cb-green{border-color:var(--green);background:var(--green-dim);color:var(--green);}
.cb-yellow{border-color:var(--yellow);background:var(--yellow-dim);color:var(--yellow);}
.cb-red  {border-color:var(--red);   background:transparent;     color:transparent;}
.cb-checked{border-color:var(--green);background:var(--green);color:#fff;}

.feat-item-text{flex:1;transition:color .15s;}
.feat-item.checked .feat-item-text{color:var(--text3);text-decoration:line-through;}
.loc-badge{display:inline-block;margin-left:8px;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:600;vertical-align:middle;white-space:nowrap;text-decoration:none;}
.loc-link{background:#1e3a5f;color:#93c5fd;border:1px solid #1d4ed8;cursor:pointer;}
.loc-link:hover{background:#1d4ed8;color:#fff;}
.loc-tag{background:#3b2f1a;color:#fcd34d;border:1px solid #92400e;cursor:help;}
.feat-item.checked .cb-red{border-color:var(--green);background:var(--green);color:#fff;}

.feat-icon{font-weight:700;flex-shrink:0;width:16px;text-align:center;}

.empty{color:var(--text3);font-size:13px;padding:16px 0;}

/* fill colours */
.fill-g{background:var(--green);}
.fill-b{background:var(--blue);}
.fill-y{background:var(--yellow);}
.fill-r{background:var(--red);}
.fill-p{background:var(--purple);}

/* phase pills */
.pp-0{background:#312e81;color:#a5b4fc;}
.pp-1{background:#064e3b;color:#6ee7b7;}
.pp-2{background:#78350f;color:#fcd34d;}
.pp-3{background:#4c0519;color:#fda4af;}

/* progress ring in hero meta */
.prog-ring{display:flex;align-items:center;gap:5px;}

@media(max-width:680px){
  .topnav,.hero,.content{padding-left:20px;padding-right:20px;}
  .hero-stats{flex-direction:column;align-items:flex-start;gap:12px;}
}
</style>
</head>
<body>

<nav class="topnav">
  <a class="back-btn" href="系統盤點分析報告.html">← 返回總覽</a>
  <span class="breadcrumb" id="bc">智慧設備維保平台</span>
  <div class="nav-tabs">
    <div class="nav-tab active" data-tab="steps"    onclick="switchTab('steps',this)">📋 實作規劃</div>
    <div class="nav-tab"        data-tab="features" onclick="switchTab('features',this)">🔍 功能清單</div>
  </div>
</nav>

<div class="hero" id="hero"></div>

<div class="content">
  <div class="tab-panel active" id="tab-steps"></div>
  <div class="tab-panel"        id="tab-features"></div>
</div>


<script src="modules-data.js"></script>
<script>
// ── constants ────────────────────────────────────────────
const phaseLabels  = {0:'Phase 0',1:'Phase 1',2:'Phase 2',3:'Phase 3'};
const phasePillCls = {0:'pp-0',1:'pp-1',2:'pp-2',3:'pp-3'};
const statusMap    = {
  done: {cls:'sb-done', label:'已完成'},
  next: {cls:'sb-next', label:'下一步'},
  plan: {cls:'sb-plan', label:'規劃中'},
  block:{cls:'sb-block',label:'等待前提'},
};
const stepDotStyle = {
  done: {bg:'var(--green)', color:'#fff',          ch:'✓'},
  next: {bg:'var(--blue)',  color:'#fff',          ch:'→'},
  plan: {bg:'var(--bg3)',   color:'var(--text2)',  ch:'·'},
  block:{bg:'var(--red)',   color:'#fff',          ch:'!'},
};
const priLabel = {'p-c':'關鍵','p-h':'高','p-m':'中','p-l':'低'};

function pctColor(p){return p>=70?'var(--green)':p>=30?'var(--blue)':p>0?'var(--yellow)':'var(--red)';}

// ── load module ──────────────────────────────────────────
const id = location.hash.replace('#','') || MODULES[0].id;
const m  = MODULES.find(x=>x.id===id) || MODULES[0];

document.getElementById('bc').innerHTML = `<span>${m.title}</span>`;
document.title = `${m.title} — 智慧設備維保平台`;

// ── localStorage helpers ─────────────────────────────────
const storeKey = (type, idx) => `chk_${m.id}_${type}_${idx}`;
const stepKey  = idx => `step_${m.id}_${idx}`;

function getCheck(type, idx){ return localStorage.getItem(storeKey(type, idx)) === '1'; }
function setCheck(type, idx, val){ localStorage.setItem(storeKey(type, idx), val?'1':'0'); }
function getStepDone(idx){ return localStorage.getItem(stepKey(idx)) === '1'; }
function setStepDone(idx, val){ localStorage.setItem(stepKey(idx), val?'1':'0'); }

// count checked "missing" items
function countCheckedMissing(){
  return m.missing.filter((_,i)=>getCheck('missing',i)).length;
}

// ── HERO ─────────────────────────────────────────────────
function renderHero(){
  const checkedMissing = countCheckedMissing();
  const doneSteps      = m.steps.filter((_,i)=>getStepDone(i)).length;
  const pc = pctColor(m.pct);

  // effective progress = base + bonus from checked missing items
  const bonus = m.missing.length > 0 ? Math.round((checkedMissing/m.missing.length)*(100-m.pct)) : 0;
  const effectivePct = Math.min(100, m.pct + bonus);
  const epColor = pctColor(effectivePct);

  document.getElementById('hero').innerHTML = `
    <div class="phase-pill ${phasePillCls[m.phase]}">${phaseLabels[m.phase]}</div>
    <div class="hero-title">${m.title}</div>
    <div class="hero-sub">${m.sub}</div>
    <div class="hero-stats">
      <div class="hero-pct" style="color:${epColor}" id="hero-pct">${effectivePct}%</div>
      <div class="hero-pbar-wrap">
        <div class="hero-pbar-bg">
          <div class="hero-pbar-fill ${m.fillCls}" style="width:${m.pct}%" id="bar-base"></div>
        </div>
        <div class="hero-meta">
          <div class="hero-meta-item"><div class="dot" style="background:var(--green)"></div>
            已完成 ${m.done.length} 項</div>
          <div class="hero-meta-item"><div class="dot" style="background:var(--yellow)"></div>
            部分完成 ${m.partial.length} 項</div>
          <div class="hero-meta-item"><div class="dot" style="background:var(--red)"></div>
            待完成 <span id="meta-miss">${m.missing.length - checkedMissing}</span> / ${m.missing.length} 項</div>
          <div class="hero-meta-item"><div class="dot" style="background:var(--blue)"></div>
            步驟完成 <span id="meta-steps">${doneSteps}</span> / ${m.steps.length} 步</div>
        </div>
      </div>
    </div>
  `;
}
renderHero();

// update hero counters without full re-render
function updateHeroCounters(){
  const checkedMissing = countCheckedMissing();
  const doneSteps      = m.steps.filter((_,i)=>getStepDone(i)).length;
  const bonus = m.missing.length > 0 ? Math.round((checkedMissing/m.missing.length)*(100-m.pct)) : 0;
  const effectivePct = Math.min(100, m.pct + bonus);
  const epColor = pctColor(effectivePct);

  const pctEl = document.getElementById('hero-pct');
  const barEl = document.getElementById('bar-base');
  const missEl= document.getElementById('meta-miss');
  const stpEl = document.getElementById('meta-steps');
  if(pctEl){ pctEl.textContent = effectivePct+'%'; pctEl.style.color = epColor; }
  if(barEl){ barEl.style.width = effectivePct+'%'; }
  if(missEl){ missEl.textContent = m.missing.length - checkedMissing; }
  if(stpEl){ stpEl.textContent = doneSteps; }
}

// ── LOCATION BADGE ───────────────────────────────────────
const SITE_BASE = 'http://localhost:5000/pd/inspect';
function buildLocBadge(o){
  const loc = o.loc || '';
  const label = o.locLabel || '';
  // Frontend route without :param → clickable link
  if (loc.startsWith('/') && !loc.includes(':')) {
    return `<a class="loc-badge loc-link" href="${SITE_BASE + loc}" target="_blank" title="前往 ${loc}">📍 ${label}</a>`;
  }
  // Parametric route (needs context) or backend path → informational tag
  const icon = loc.startsWith('/') ? '📍' : '🔧';
  return `<span class="loc-badge loc-tag" title="${loc}">${icon} ${label}</span>`;
}

// ── STEPS TAB ────────────────────────────────────────────
function renderSteps(){
  const html = m.steps.map((s,i)=>{
    const isDone = getStepDone(i);
    const sd  = stepDotStyle[isDone ? 'done' : s.status];
    const sm  = statusMap[isDone ? 'done' : s.status];
    const tasks = (s.tasks||[]).map(t=>{
      const locBadge = t.locLabel ? buildLocBadge(t) : '';
      return `<li><span class="pri ${t.p}">${priLabel[t.p]||''}</span>${t.t}${locBadge}</li>`;
    }).join('');
    const note = s.note ? `<div class="note note-${s.note.type}">${s.note.text}</div>` : '';
    return `
      <div class="step" id="step-${i}">
        <div class="step-line">
          <div class="step-dot ${isDone?'step-dot-done':''}"
               style="background:${sd.bg};color:${sd.color}"
               title="${isDone?'點擊取消完成':'點擊標記為完成'}"
               onclick="toggleStep(${i})">${sd.ch}</div>
          <div class="step-connector"></div>
        </div>
        <div class="step-body ${isDone?'is-done':''}" id="step-body-${i}">
          <div class="step-head">
            <span class="step-name">${s.name}</span>
            <span class="step-badge ${sm.cls}" id="step-badge-${i}">${sm.label}</span>
            <span class="step-done-stamp" id="step-stamp-${i}">✓ 已完成</span>
          </div>
          <div class="step-desc">${s.desc}</div>
          ${tasks ? `<ul class="step-tasks">${tasks}</ul>` : ''}
          ${note}
        </div>
      </div>`;
  }).join('');
  document.getElementById('tab-steps').innerHTML = `<div class="steps">${html}</div>`;
}

function toggleStep(i){
  const isDone = !getStepDone(i);
  setStepDone(i, isDone);

  const dot  = document.querySelector(`#step-${i} .step-dot`);
  const body = document.getElementById(`step-body-${i}`);
  const badge= document.getElementById(`step-badge-${i}`);
  const sd   = stepDotStyle[isDone ? 'done' : m.steps[i].status];
  const sm   = statusMap[isDone ? 'done' : m.steps[i].status];

  dot.style.background = sd.bg;
  dot.style.color      = sd.color;
  dot.textContent      = sd.ch;
  dot.classList.toggle('step-dot-done', isDone);
  body.classList.toggle('is-done', isDone);
  badge.className      = `step-badge ${sm.cls}`;
  badge.textContent    = sm.label;
  updateHeroCounters();
}

// ── FEATURES TAB ─────────────────────────────────────────
function renderFeatures(){
  const el = document.getElementById('tab-features');

  function makeGroup(items, type, iconDefault, cbDefaultCls, titleColor, title){
    if(!items.length) return '';
    const checkedCount = items.filter((_,i)=>getCheck(type,i)).length;
    const rows = items.map((item,i)=>{
      const t = typeof item === 'string' ? item : item.t;
      const locBadge = (typeof item === 'object' && item.locLabel)
        ? buildLocBadge(item) : '';
      const checked = getCheck(type,i);
      // items that start as "done" can't be unchecked (always green tick)
      const isFixed = (type==='done');
      const cbCls   = isFixed ? 'cb-green' : (checked ? 'cb-checked' : cbDefaultCls);
      const ch      = (isFixed||checked) ? '✓' : '';
      return `
        <li class="feat-item ${checked&&!isFixed?'checked':''} ${isFixed?'is-fixed':''}"
            id="fi-${type}-${i}"
            onclick="${isFixed?'':  `toggleFeat('${type}',${i})`}">
          <div class="cb ${cbCls}" id="cb-${type}-${i}">${ch}</div>
          <span class="feat-item-text">${t}${locBadge}</span>
        </li>`;
    }).join('');

    const progressTxt = type!=='done'
      ? `<span class="feat-progress" id="fp-${type}">${checkedCount}/${items.length} 完成</span>`
      : '';

    return `
      <div class="feat-group">
        <div class="feat-group-title" style="color:${titleColor}">
          ${title}（${items.length} 項）${progressTxt}
        </div>
        <ul class="feat-list">${rows}</ul>
      </div>`;
  }

  const html =
    makeGroup(m.done,    'done',    '✓','cb-green',  'var(--green)',  '✓ 已完成') +
    makeGroup(m.partial, 'partial', '△','cb-yellow', 'var(--yellow)', '△ 部分完成') +
    makeGroup(m.missing, 'missing', '✗','cb-red',    'var(--red)',    '✗ 尚未實作');

  el.innerHTML = html || '<div class="empty">此模組尚無任何功能紀錄</div>';
}

function toggleFeat(type, idx){
  const checked = !getCheck(type,idx);
  setCheck(type, idx, checked);

  const li = document.getElementById(`fi-${type}-${idx}`);
  const cb = document.getElementById(`cb-${type}-${idx}`);

  if(checked){
    li.classList.add('checked');
    cb.className   = 'cb cb-checked';
    cb.textContent = '✓';
  } else {
    li.classList.remove('checked');
    const defaultCls = type==='partial' ? 'cb-yellow' : 'cb-red';
    cb.className   = `cb ${defaultCls}`;
    cb.textContent = '';
  }

  // update group progress counter
  const fp = document.getElementById(`fp-${type}`);
  if(fp){
    const total   = m[type].length;
    const checked2= m[type].filter((_,i)=>getCheck(type,i)).length;
    fp.textContent = `${checked2}/${total} 完成`;
  }

  updateHeroCounters();
}

// ── TAB SWITCH ───────────────────────────────────────────
function switchTab(name, el){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// ── SUMMARY ──────────────────────────────────────────────
function renderSummary(){
  if(!m.summary) return;
  const s = m.summary;
  const sections = s.sections.map(sec=>`
    <div style="margin-bottom:20px;">
      <div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:6px;">
        ${sec.heading}
      </div>
      <div style="font-size:13px;color:var(--text2);line-height:1.8;">
        ${sec.body}
      </div>
    </div>
  `).join('');

  const box = document.createElement('div');
  box.style.cssText = `
    max-width:820px;margin:0 auto 0;
    padding:0 40px 60px;
  `;
  box.innerHTML = `
    <div style="border-top:1px solid var(--border);padding-top:32px;margin-top:8px;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
                  color:var(--text3);margin-bottom:20px;">背景說明</div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;
                  padding:24px 28px;">
        <div style="font-size:17px;font-weight:700;color:#fff;margin-bottom:20px;
                    padding-bottom:14px;border-bottom:1px solid var(--border);">
          ${s.title}
        </div>
        ${sections}
      </div>
    </div>
  `;
  document.querySelector('.content').appendChild(box);
}

// ── INIT ─────────────────────────────────────────────────
renderSteps();
renderFeatures();
renderSummary();
</script>
</body>
</html>
